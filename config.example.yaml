# ─────────────────────────────────────────────────────────────────────────────
# config.example.yaml — modèle de configuration
#
# NE PAS éditer ce fichier directement pour un usage réel : lancer plutôt
#     python -m cozytouch_homekit configure
# qui génère `config.yaml` (gitignored, contient vos identifiants).
#
# Ce modèle documente toutes les clés disponibles.
# ─────────────────────────────────────────────────────────────────────────────

# Langue de l'interface (page web) : "en" ou "fr". / UI language: "en" or "fr".
language: "en"

# Identifiants du compte Cozytouch (cloud Atlantic).
# ⚠️ Le mot de passe est CHIFFRÉ au repos par `configure` : dans le vrai
#    config.yaml il apparaît sous la forme "enc:v1:…" (clé : fichier séparé
#    .secret.key, 0600, gitignoré). Ne le saisissez pas à la main ici.
cozytouch:
  username: "votre.email@example.com"
  password: "enc:v1:..."   # généré par `configure` (jamais en clair)
  # Serveur Overkiz. Pour Atlantic/Cozytouch : "atlantic_cozytouch".
  server: "atlantic_cozytouch"

# Accessoires exposés à HomeKit — NORMALEMENT généré par `configure`, qui
# détecte automatiquement les capacités de ton compte et te les fait cocher.
# Un accessoire (= une tuile, rangeable dans sa propre pièce) par entrée.
#   key        : identifiant stable interne (préserve l'AID entre reconfig)
#   aid        : identifiant HomeKit STABLE (>= 2 ; attribué automatiquement)
#   type       : temperature_sensor | humidity_sensor | contact_sensor |
#                motion_sensor | occupancy_sensor | smoke_sensor | leak_sensor |
#                switch | outlet | light | window_covering | lock | garage
#   name       : libellé de la tuile (renommable dans Maison)
#   device_url : device Overkiz source
#   spec       : states/commands Overkiz résolus pour CE device (par la détection)
#
# Exemples :
exposed:
  - key: "io://1234-5678-9012/AAAA::core:TemperatureState"
    aid: 2
    type: "temperature_sensor"
    name: "Température ambiante"
    device_url: "io://1234-5678-9012/AAAA"
    spec: {state: "core:TemperatureState"}
  - key: "io://1234-5678-9012/BBBB::window_covering"
    aid: 3
    type: "window_covering"
    name: "Volet salon"
    device_url: "io://1234-5678-9012/BBBB"
    spec: {pos_state: "core:ClosureState", set: "setClosure",
           open: "open", close: "close", stop: "stop"}

# (Legacy) Ancien schéma features/sensors + device : ignoré dès que `exposed`
# est présent. Conservé pour rétro-compatibilité.
device:
  pac_url: ""
  ecs_url: ""

# Paramètres HomeKit (bridge).
homekit:
  name: "PAC Atlantic"
  port: 51826
  # Fichier d'état HAP (clés d'appairage + pincode). Stable entre redémarrages.
  persist_file: "accessory.state"

# Polling : l'API Overkiz throttle → espacer + backoff.
polling:
  interval: 120       # secondes entre deux lectures (90–300 ok ; 30 minimum)
  backoff_base: 30    # délai initial de backoff sur erreur
  backoff_max: 600    # plafond du backoff exponentiel

# Mini page web de statut : http://<pi>.local:8080/
# ⚠️ Affiche le PIN d'appairage + infos système → réseau de confiance.
#    (N'expose jamais le mot de passe Cozytouch.) Mettre enabled: false pour couper.
web:
  enabled: true
  host: "0.0.0.0"     # 0.0.0.0 = accessible sur le LAN ; 127.0.0.1 = local seul
  port: 8080
