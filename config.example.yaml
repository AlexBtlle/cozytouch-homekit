# ─────────────────────────────────────────────────────────────────────────────
# config.example.yaml — modèle de configuration
#
# NE PAS éditer ce fichier directement pour un usage réel : lancer plutôt
#     python -m cozytouch_homekit configure
# qui génère `config.yaml` (gitignored, contient vos identifiants).
#
# Ce modèle documente toutes les clés disponibles.
# ─────────────────────────────────────────────────────────────────────────────

# Identifiants du compte Cozytouch (cloud Atlantic).
cozytouch:
  username: "votre.email@example.com"
  password: "votre_mot_de_passe"
  # Serveur Overkiz. Pour Atlantic/Cozytouch : "atlantic_cozytouch".
  server: "atlantic_cozytouch"

# (Legacy/optionnel) deviceURL nommés, utilisés seulement si un capteur
# ci-dessous n'a pas son propre device_url. Plus nécessaire avec le mapping
# par-capteur (recommandé).
device:
  pac_url: ""
  ecs_url: ""

# Mapping capteur HomeKit → (device_url + state) Overkiz.
# ⚠️ Chaque sonde est un device Overkiz DISTINCT (ambiante / extérieure / ECS
#    ont chacune leur device_url). Les noms de states dépendent de VOTRE
#    firmware → faire `explore` d'abord, ne PAS coder en aveugle (Étape 0).
#
# Exemple RÉEL (Alféa Extensa AI Duo, firmware io:AtlanticPassAPC*) :
sensors:
  temp_ambiante:
    # io:AtlanticPassAPCZoneTemperatureSensor
    device_url: "io://1234-5678-9012/XXXXXXXX"
    state: "core:TemperatureState"
  temp_exterieure:
    # io:AtlanticPassAPCOutsideTemperatureSensor
    device_url: "io://1234-5678-9012/XXXXXXXX"
    state: "core:TemperatureState"
  temp_ecs:
    # io:AtlanticPassAPCDHWComponent — ⚠ ce firmware n'expose que des CONSIGNES
    # ECS (pas de température mesurée du ballon).
    device_url: "io://1234-5678-9012/XXXXXXXX"
    state: "core:TargetDHWTemperatureState"

# Quels services exposer à HomeKit. `false` = service absent = aucune tuile.
# (V1 : seuls les capteurs de température sont implémentés.)
features:
  temp_ambiante:   true
  temp_exterieure: true
  temp_ecs:        false
  thermostat:      false   # V2 — non implémenté
  boost_ecs:       false   # V2 — non implémenté

# Paramètres HomeKit (accessoire standalone, PAS un bridge).
homekit:
  name: "PAC Atlantic"
  port: 51826
  # Fichier d'état HAP (clés d'appairage + pincode). Stable entre redémarrages.
  persist_file: "accessory.state"

# Polling : l'API Overkiz throttle → espacer + backoff.
polling:
  interval: 120       # secondes entre deux lectures (90–300 ok ; 30 minimum)
  backoff_base: 30    # délai initial de backoff sur erreur
  backoff_max: 600    # plafond du backoff exponentiel
